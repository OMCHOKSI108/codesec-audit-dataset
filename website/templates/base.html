<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CodeSecAudit AI{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="{{ 'dark' if session.get('theme', 'dark') == 'dark' else 'light' }}">
  <nav class="navbar">
    <div class="container nav-inner">
      <a href="{{ url_for('index') }}" class="nav-brand">CodeSecAudit AI</a>
      <div class="nav-links">
        <a href="{{ url_for('index') }}">Home</a>
        {% if session.get('user') %}
          <a href="{{ url_for('dashboard') }}">Dashboard</a>
          <a href="{{ url_for('reviews_page') }}">Reviews</a>
          <a href="{{ url_for('usage_page') }}">Usage</a>
          <div class="nav-user">
            <img src="{{ session.user.avatar_url }}" alt="" class="nav-avatar" width="24" height="24">
            <span>{{ session.user.username }}</span>
            <a href="{{ url_for('auth.logout') }}" class="btn-small">Logout</a>
          </div>
        {% else %}
          <a href="{{ url_for('login_page') }}">Sign In</a>
        {% endif %}
      </div>
    </div>
  </nav>

  <main class="container">
    {% for cat, msg in get_flashed_messages(with_categories=true) %}
      <div class="flash flash-{{ cat }}">{{ msg }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span>&copy; 2026 CodeSecAudit AI</span>
      <a href="{{ url_for('contact_page') }}">Contact</a>
      <a href="https://github.com/OMCHOKSI108/codesec-audit-dataset" target="_blank">GitHub</a>
    </div>
  </footer>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
